.stock-name { color: #f39c12; font-size: 15px; margin-left: 10px; font-weight: bold; }

.macd-wrap { position: relative; height: 160px; padding: 10px; }
canvas { width: 100%; height: 100%; }
.sidebar { position: absolute; top: 14px; left: 10px; z-index: 10; max-width: 280px; transition: transform 0.3s ease; }
.sidebar.collapsed { transform: translateX(-290px); }
.toggle-btn { position: absolute; top: 10px; left: 10px; z-index: 20; background: #238636; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; opacity: 0.3; }
.toggle-btn:hover { opacity: 1; }
.zs-labels { display: none; }
.guide { background: rgba(13,17,23,0.95); border: 1.5px solid; border-radius: 10px; padding: 14px 16px; font-size: 12px; line-height: 1.9; }
.guide.above { border-color: #ef5350; background: rgba(31,16,16,0.95); }
.guide.below { border-color: #26a69a; background: rgba(15,31,24,0.95); }
.guide.inside { border-color: #f39c12; background: rgba(31,26,10,0.95); }

.guide ul { padding-left: 16px; }
.guide .warn { color: #f39c12; margin-top: 8px; font-weight: bold; }
.legend { position: absolute; bottom: 10px; right: 14px; z-index: 10; display: flex; gap: 16px; font-size: 11px; color: #8b949e; }
.legend span::before { content: ''; display: inline-block; width: 12px; height: 12px; border-radius: 2px; margin-right: 5px; vertical-align: middle; }
.legend .zs::before { background: rgba(243,156,18,0.4); border: 1px solid #f39c12; }
.legend .top::before { background: #ef5350; }
.legend .bot::before { background: #26a69a; }
.draggable { cursor: move; user-select: none; }
.drag-handle { position: absolute; top: 2px; right: 4px; font-size: 16px; color: #58a6ff; cursor: grab; line-height: 1; opacity: 0.6; transition: opacity 0.2s; }
.drag-handle:hover { opacity: 1; }
.drag-handle:active { cursor: grabbing; }
.sidebar.draggable .drag-handle { top: 4px; right: 6px; font-size: 20px; }
.macd-legend.draggable .drag-handle { top: 4px; right: 6px; font-size: 18px; }
.legend.draggable .drag-handle { top: 4px; right: 6px; font-size: 18px; }
.macd-legend { position: absolute; top: 14px; left: 84px; z-index: 10; background: rgba(13,17,23,0.95); border: 1px solid #30363d; border-radius: 8px; padding: 10px 14px; font-size: 11px; color: #8b949e; line-height: 1.8; }

.macd-legend .dea { color: #f78166; font-weight: bold; }
.macd-legend .note { margin-top: 4px; color: #f39c12; }
.chart-header { padding: 12px 16px; border-bottom: 1px solid #21262d; display: flex; justify-content: space-between; align-items: center; }

// 设置股票代码
function setSymbol(symbol) {
  document.getElementById('stockInput').value = symbol;
  analyzeStock();
}

// 回车键触发分析
document.getElementById('stockInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') analyzeStock();
});

// 分析股票
async function analyzeStock() {
  const input = document.getElementById('stockInput').value.trim();
  if (!input) {
    alert('请输入股票代码或名称');
    return;
  }
  
  currentSymbol = input;
  document.getElementById('stockName').textContent = '';
  fetchStockName(input);  // 异步获取股票名称
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('error').classList.add('hidden');
  document.getElementById('content').style.display = 'none';
  document.getElementById('analyzeBtn').disabled = true;
  
  try {
    await init();
  } catch(e) {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('error').classList.remove('hidden');
    document.getElementById('error').innerHTML = `数据加载失败：${e.message}<br><br>请检查股票代码是否正确，或稍后重试`;
  }
  document.getElementById('analyzeBtn').disabled = false;
}

// 获取新浪市场前缀：6开头=sh，其余=sz
function getSinaPrefix(symbol) {
  if (symbol.startsWith('6')) return 'sh';
  return 'sz';
}

// 获取东方财富 secid（备用数据源）
function getSecid(symbol) {
  if (/^\d{5}$/.test(symbol)) return '116.' + symbol;
  if (symbol.startsWith('6')) return '1.' + symbol;
  if (symbol.startsWith('8') || symbol.startsWith('43') || symbol.startsWith('83') || symbol.startsWith('87')) return '0.' + symbol;
  return '0.' + symbol;
}

// 获取K线数据：新浪API为主，东方财富为备
async function fetchKline(symbol, klt) {
  // 1. 新浪财经API（对浏览器fetch友好）
  const scaleMap = { 101: 240, 102: 1680, 103: 7200 };
  const scale = scaleMap[klt] || 240;
  const sinaSymbol = getSinaPrefix(symbol) + symbol;
  try {
    const url = `https://money.finance.sina.com.cn/quotes_service/api/json_v2.php/CN_MarketData.getKLineData?symbol=${sinaSymbol}&scale=${scale}&ma=no&datalen=300`;
    const res = await fetch(url);
    const text = await res.text();
    const data = JSON.parse(text);
    if (Array.isArray(data) && data.length > 0) {
      return data.map(item => ({
        date: item.day,
        open: parseFloat(item.open),
        close: parseFloat(item.close),
        high: parseFloat(item.high),
        low: parseFloat(item.low),
        vol: parseInt(item.volume)
      }));
    }
  } catch(e) { /* 新浪失败，尝试东方财富 */ }

  // 2. 东方财富API（备用）
  const secid = getSecid(symbol);
  try {
    const res2 = await fetch(`https://push2his.eastmoney.com/api/qt/stock/kline/get?secid=${secid}&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61&klt=${klt}&fqt=1&end=20500101&lmt=300`);
    const json = await res2.json();
    if (json.data && json.data.klines) {
      return json.data.klines.map(line => {
        const p = line.split(',');
        return { date: p[0], open: +p[1], close: +p[2], high: +p[3], low: +p[4], vol: +p[5] };
      });
    }
  } catch(e) {}

  throw new Error('数据获取失败，请稍后重试');
}

// ========= 缠论核心 =========
function processContain(data) {
  const r = [data[0]];
  for (let i = 1; i < data.length; i++) {
    const c = data[i], p = r[r.length-1];
    if ((c.high >= p.high && c.low <= p.low) || (c.high <= p.high && c.low >= p.low)) {
      const up = r.length < 2 || p.high > r[r.length-2].high;
      r[r.length-1] = { ...c, high: up ? Math.max(c.high, p.high) : Math.min(c.high, p.high), low: up ? Math.max(c.low, p.low) : Math.min(c.low, p.low) };
    } else r.push(c);
  }
  return r;
}

function findFractals(data) {
  const tops = [], bots = [];
  for (let i = 2; i < data.length - 2; i++) {
    const P2 = data[i-2], P1 = data[i-1], C = data[i], N1 = data[i+1], N2 = data[i+2];
    if (C.high > P1.high && C.high > N1.high && C.high >= P2.high && C.high >= N2.high &&
        C.low > P1.low && C.low > N1.low) {
      tops.push({date:C.date, price:C.high, idx:i});
    }
    if (C.low < P1.low && C.low < N1.low && C.low <= P2.low && C.low <= N2.low &&
        C.high < P1.high && C.high < N1.high) {
      bots.push({date:C.date, price:C.low, idx:i});
    }
  }
  return { tops, bots };
}

function buildPens(tops, bots, data) {
  const pens = [];
  let lastType = null, lastIdx = -1, lastPrice = 0;
  const allF = [...tops.map(t=>({...t,type:'t',isUp:false})), ...bots.map(b=>({...b,type:'b',isUp:true}))].sort((a,b)=>a.idx-b.idx);
  
  for (const f of allF) {
    if (lastType === null) {
      lastType = f.type;
      lastIdx = f.idx;
      lastPrice = f.price;
    } else if (lastType !== f.type && f.idx - lastIdx >= 2) {
      const isUp = f.type === 't';
      pens.push({
        startIdx: lastIdx, endIdx: f.idx,
        startDate: data[lastIdx].date, endDate: f.date,
        isUp: isUp, startPrice: lastPrice, endPrice: f.price,
        high: Math.max(lastPrice, f.price), low: Math.min(lastPrice, f.price)
      });
      lastType = f.type; lastIdx = f.idx; lastPrice = f.price;
    } else if (lastType === f.type) {
      const shouldReplace = f.type === 't' ? f.price > lastPrice : f.price < lastPrice;
      if (shouldReplace) {
        if (pens.length > 0) {
          const lastPen = pens[pens.length - 1];
          if (lastPen.endIdx === lastIdx) {
            lastPen.endIdx = f.idx; lastPen.endDate = f.date;
            lastPen.endPrice = f.price;
            lastPen.high = Math.max(lastPen.startPrice, f.price);
            lastPen.low = Math.min(lastPen.startPrice, f.price);
          }
        }
        lastIdx = f.idx; lastPrice = f.price;
      }
    }
  }
  return pens;
}

function findZhongshu(data, tops, bots) {
  const pens = buildPens(tops, bots, data);
  if (pens.length < 3) {
    const r = data.slice(Math.floor(data.length * 0.4));
    const hs = r.map(d=>d.high).sort((a,b)=>a-b), ls = r.map(d=>d.low).sort((a,b)=>a-b);
    return { top: hs[Math.floor(hs.length*0.75)], bot: ls[Math.floor(ls.length*0.25)], mid: r[Math.floor(r.length/2)].close, pens: [] };
  }

  const lastPrice = data[data.length - 1].close;
  const prevPrice = data[Math.max(0, data.length - 20)].close;
  const isUpTrend = lastPrice > prevPrice;

  let best = null;
  for (let i = pens.length - 3; i >= 0; i--) {
    const windowPens = pens.slice(i, i + 3);
    let isValid = false;
    if (isUpTrend) isValid = windowPens[0].isUp && !windowPens[1].isUp && windowPens[2].isUp;
    else isValid = !windowPens[0].isUp && windowPens[1].isUp && !windowPens[2].isUp;

    if (!isValid) continue;
    const zg = Math.min(windowPens[0].high, windowPens[1].high, windowPens[2].high);
    const zd = Math.max(windowPens[0].low, windowPens[1].low, windowPens[2].low);

    if (zg > zd) {
      best = { top: zg, bot: zd, mid: (zg + zd) / 2, pens: windowPens, penStartIdx: windowPens[0].startIdx, penEndIdx: windowPens[2].endIdx, structure: isUpTrend ? '上下上' : '下上下' };
      break;
    }
  }

  if (!best) {
    const r = data.slice(Math.floor(data.length * 0.4));
    const hs = r.map(d=>d.high).sort((a,b)=>a-b), ls = r.map(d=>d.low).sort((a,b)=>a-b);
    best = { top: hs[Math.floor(hs.length*0.75)], bot: ls[Math.floor(ls.length*0.25)], mid: r[Math.floor(r.length/2)].close, pens: [] };
  }
  return best;
}

function calcMACD(closes) {
  const ema = (arr, sp) => { 
    const k=2/(sp+1); 
    const result = [arr[0]];
    for (let i = 1; i < arr.length; i++) result.push(arr[i]*k + result[i-1]*(1-k));
    return result;
  };
  const e12 = ema(closes, 12), e26 = ema(closes, 26);
  const dif = e12.map((v,i) => v - e26[i]);
  const dea = ema(dif, 9);
  const macd = dif.map((v,i) => (v - dea[i]) * 2);
  return { dif, dea, macd };
}

function analyze(data, zs) {
  const cp = data[data.length-1].close;
  let pos = cp > zs.top ? 'above' : cp < zs.bot ? 'below' : 'inside';
  const posCN = pos === 'above' ? '中枢上方（上涨趋势区）' : pos === 'below' ? '中枢下方（下跌趋势区）' : '中枢内部（震荡盘整区）';
  const { dif, dea, macd } = calcMACD(data.map(d => d.close));
  const m = macd.slice(-50);
  let div = false, divT = '';
  if (m.length > 10) {
    const h = Math.floor(m.length/2);
    if (Math.abs(m.slice(h).reduce((a,b)=>a+b,0)) < Math.abs(m.slice(0,h).reduce((a,b)=>a+b,0)) * 0.75) {
      div = true; divT = cp < zs.mid ? '底背驰' : '顶背驰';
    }
  }
  return { pos, posCN, cp, dif, dea, macd, div, divT };
}

// ========= 绘图 =========
function drawKline(canvasId, data, zs, fractals, analysis) {
  const canvas = document.getElementById(canvasId);
  const rect = canvas.parentElement.getBoundingClientRect();
  const w = rect.width, h = rect.height;
  canvas.width = w * 2; canvas.height = h * 2;
  canvas.style.width = w+'px'; canvas.style.height = h+'px';
  const ctx = canvas.getContext('2d'); ctx.scale(2,2);

  const pL=60, pR=70, pT=30, pB=40;
  const cw = w-pL-pR, ch = h-pT-pB;
  const N = data.length, bw = cw/N;
  const highs = data.map(d=>d.high), lows = data.map(d=>d.low);
  const pMin = Math.min(...lows)*0.995, pMax = Math.max(...highs)*1.005;
  const toX = i => pL + i*bw + bw/2;
  const toY = p => pT + (1-(p-pMin)/(pMax-pMin))*ch;

  ctx.strokeStyle='#21262d'; ctx.lineWidth=0.5;
  for (let i=0;i<=6;i++) {
    const y=pT+(ch/6)*i;
    ctx.beginPath(); ctx.moveTo(pL,y); ctx.lineTo(w-pR,y); ctx.stroke();
    ctx.fillStyle='#8b949e'; ctx.font='10px Microsoft YaHei'; ctx.textAlign='right';
    ctx.fillText((pMax-(pMax-pMin)*(i/6)).toFixed(2), pL-8, y+3);
  }

  ctx.fillStyle='#8b949e'; ctx.font='9px Microsoft YaHei'; ctx.textAlign='center';
  const step = Math.max(1,Math.floor(N/6));
  for (let i=0;i<N;i+=step) {
    const dateStr = data[i].date.substring(2);
    ctx.fillText(dateStr, toX(i), h-10);
  }

  if (zs.pens && zs.pens.length === 3) {
    const y1=toY(zs.top), y2=toY(zs.bot);
    ctx.fillStyle='rgba(243,156,18,0.15)'; ctx.fillRect(pL, y1, cw, y2-y1);
    ctx.setLineDash([8,4]); ctx.strokeStyle='#f39c12'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(pL,y1); ctx.lineTo(w-pR,y1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(pL,y2); ctx.lineTo(w-pR,y2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.font='bold 11px Microsoft YaHei'; ctx.fillStyle='#f39c12'; ctx.textAlign='right';
    ctx.fillText(zs.top.toFixed(2), pL-8, y1+4);
    ctx.fillText(zs.bot.toFixed(2), pL-8, y2+4);
  }

  if (zs.pens && zs.pens.length === 3) {
    const penColors = ['rgba(255,107,107,0.4)', 'rgba(78,205,196,0.4)', 'rgba(255,230,109,0.4)'];
    zs.pens.forEach((pen, idx) => {
      ctx.strokeStyle=penColors[idx]; ctx.lineWidth=4;
      const x1 = toX(pen.startIdx), y1 = toY(pen.startPrice);
      const x2 = toX(pen.endIdx), y2 = toY(pen.endPrice);
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    });
  }

  data.forEach((d,i) => {
    const x=toX(i), up=d.close>=d.open, col=up?'#ff6b6b':'#4ecdc4';
    ctx.strokeStyle=col; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x,toY(d.high)); ctx.lineTo(x,toY(d.low)); ctx.stroke();
    const bt=toY(Math.max(d.open,d.close)), bb=toY(Math.min(d.open,d.close));
    ctx.fillStyle=col; ctx.fillRect(x-bw*0.4, bt, bw*0.8, Math.max(bb-bt,1));
  });

  const curY=toY(analysis.cp);
  const cc=analysis.pos==='above'?'#ff6b6b':analysis.pos==='below'?'#4ecdc4':'#f39c12';
  ctx.strokeStyle=cc; ctx.lineWidth=1.5; ctx.setLineDash([5,3]);
  ctx.beginPath(); ctx.moveTo(pL,curY); ctx.lineTo(w-pR,curY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.font='bold 12px Microsoft YaHei'; ctx.fillStyle=cc; ctx.textAlign='right';
  ctx.fillText(analysis.cp.toFixed(2), pL-8, curY+4);
}

function drawMACD(canvasId, data, analysis) {
  const canvas = document.getElementById(canvasId);
  const rect = canvas.parentElement.getBoundingClientRect();
  const w = rect.width, h = rect.height;
  canvas.width = w*2; canvas.height = h*2;
  canvas.style.width = w+'px'; canvas.style.height = h+'px';
  const ctx = canvas.getContext('2d'); ctx.scale(2,2);

  const pL=60, pR=70, pT=20, pB=25;
  const cw = w-pL-pR, ch = h-pT-pB;
  const N = data.length, bw = cw/N;
  const {dif,dea,macd} = analysis;
  const allV=[...macd,...dif,...dea];
  const mx=Math.max(...allV)*1.1, mn=Math.min(...allV)*1.1, vr=mx-mn||1;
  const toX=i=>pL+i*bw+bw/2, toY=v=>pT+(1-(v-mn)/vr)*ch;

  ctx.strokeStyle='#30363d'; ctx.lineWidth=0.8;
  const zy=toY(0);
  ctx.beginPath(); ctx.moveTo(pL,zy); ctx.lineTo(w-pR,zy); ctx.stroke();

  macd.forEach((v,i) => {
    ctx.fillStyle=v>=0?'rgba(255,107,107,0.8)':'rgba(78,205,196,0.8)';
    const x=toX(i), barWidth = bw*0.7;
    if (v >= 0) ctx.fillRect(x - barWidth/2, toY(v), barWidth, toY(0) - toY(v));
    else ctx.fillRect(x - barWidth/2, toY(0), barWidth, toY(v) - toY(0));
  });

  [['#58a6ff',dif],['#f78166',dea]].forEach(([col,arr]) => {
    ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.beginPath();
    arr.forEach((v,i)=>i===0?ctx.moveTo(toX(i),toY(v)):ctx.lineTo(toX(i),toY(v)));
    ctx.stroke();
  });
}

function getGuideHTML(analysis) {
  const g = analysis;
  const dragHandle = `<div class="drag-handle" style="position:absolute;top:4px;right:6px;font-size:18px;color:#58a6ff;cursor:grab;line-height:1;opacity:0.6;">≡</div>`;
  if (g.pos==='above') return `<div class="guide above draggable" style="position:relative;cursor:move;">${dragHandle}<h3>📍 中枢上方 → 上涨趋势</h3><ul><li>持仓者：继续持有，跟趋势走</li><li>等待回踩中枢上轨（ZG）</li><li>回踩守住 → 第三类买点 → 加仓</li><li>回踩跌破 → 减仓观望</li></ul><p class="warn">止损：跌破ZG减仓，跌入中枢清仓</p></div>`;
  if (g.pos==='below') return `<div class="guide below draggable" style="position:relative;cursor:move;">${dragHandle}<h3>📍 中枢下方 → 下跌趋势</h3><ul><li>空仓者：不要抄底，等信号</li><li>观察MACD绿柱是否萎缩</li><li>绿柱萎缩+底分型 → 第一类买点</li><li>回调不破前低 → 第二类买点</li></ul><p class="warn">止损：买入后跌破前低立刻止损</p></div>`;
  return `<div class="guide inside draggable" style="position:relative;cursor:move;">${dragHandle}<h3>📍 中枢内部 → 震荡盘整</h3><ul><li>中枢内不轻易操作</li><li>突破ZG+回踩不破 → 第三类买点</li><li>跌破ZD+反弹不过 → 第三类卖点</li></ul><p class="warn">假突破多，确认后再动，仓位宜轻</p></div>`;
}

function toggleSidebar(period) {
  const sidebar = document.getElementById('sidebar-' + period);
  const btn = sidebar.parentElement.querySelector('.toggle-btn');
  if (sidebar.classList.contains('collapsed')) {
    sidebar.classList.remove('collapsed');
    btn.textContent = '';
  } else {
    sidebar.classList.add('collapsed');
    btn.textContent = '';
  }
}

function initDraggable() {
  document.querySelectorAll('.draggable').forEach(el => {
    const handle = el.querySelector('.drag-handle');
    if (!handle) return;
    let isDragging = false, startX, startY, initialLeft, initialTop;
    
    handle.addEventListener('mousedown', (e) => {
      isDragging = true; startX = e.clientX; startY = e.clientY;
      initialLeft = el.offsetLeft; initialTop = el.offsetTop;
      handle.style.cursor = 'grabbing';
      e.preventDefault(); e.stopPropagation();
    });
    
    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      el.style.left = `${initialLeft + e.clientX - startX}px`;
      el.style.top = `${initialTop + e.clientY - startY}px`;
    });
    
    document.addEventListener('mouseup', () => {
      if (isDragging) { isDragging = false; handle.style.cursor = 'grab'; }
    });
  });
}

  const [monthly, weekly, daily] = await Promise.all([
    fetchKline(currentSymbol, 103),

    fetchKline(currentSymbol, 101)
  ]);

  const allResults = {};
  ['monthly','weekly','daily'].forEach((period, idx) => {
    const raw = [monthly, weekly, daily][idx];
    const processed = processContain(raw);
    const fractals = findFractals(processed);
    const zs = findZhongshu(raw, fractals.tops, fractals.bots);
    const a = analyze(raw, zs);
    allResults[period] = { raw, processed, fractals, zs, analysis: a };
  });

  // 显示股票名称（从日线数据获取）
  const stockName = allResults.daily.raw[allResults.daily.raw.length-1].date || '';
  document.getElementById('stockName').textContent = currentSymbol;

  document.getElementById('loading').classList.add('hidden');
  document.getElementById('content').style.display = 'block';

  ['daily','weekly','monthly'].forEach(period => {
    const r = allResults[period];
    const sec = document.getElementById('sec-'+period);

    const klineWrap = sec.querySelector('.kline-wrap');
    klineWrap.innerHTML = `
      <button class="toggle-btn" onclick="toggleSidebar('${period}')">收起提示</button>
      <div class="sidebar" id="sidebar-${period}">${getGuideHTML(r.analysis)}</div>
      <div class="zs-labels" id="zslabels-${period}">
        <div class="zg">ZG ${r.zs.top.toFixed(2)}</div>
        <div class="zd">ZD ${r.zs.bot.toFixed(2)}</div>
      </div>
      <canvas id="kline-${period}"></canvas>`;

    const hdr = document.getElementById('hdr-'+period);
    const posCls = r.analysis.pos==='above'?'up':r.analysis.pos==='below'?'down':'mid';
    hdr.innerHTML = `<span class="zs-info">中枢：<strong>${r.zs.bot.toFixed(2)}</strong> ~ <strong>${r.zs.top.toFixed(2)}</strong></span><span class="price-info ${posCls}">${r.analysis.cp.toFixed(2)}</span>`;

    const macdWrap = sec.querySelector('.macd-wrap');
    macdWrap.innerHTML = `<canvas id="macd-${period}"></canvas>`;

    drawKline('kline-'+period, r.raw, r.zs, r.fractals, r.analysis);
    drawMACD('macd-'+period, r.raw, r.analysis);
  });
  
  initDraggable();

  const posDesc = p => p==='above'?'上涨趋势区':p==='below'?'下跌趋势区':'震荡盘整区';
  const posCls = p => p==='above'?'up':p==='below'?'down':'mid';
  let rows = '';
  ['daily','weekly','monthly'].forEach(period => {
    const r = allResults[period];
    const div = r.analysis.div ? ` ⚠${r.analysis.divT}` : '';
    rows += `<tr><td>${PERIOD_CN[period]}</td><td>${r.zs.bot.toFixed(2)} ~ ${r.zs.top.toFixed(2)}</td><td class="${posCls(r.analysis.pos)}">${posDesc(r.analysis.pos)}${div}</td><td class="${posCls(r.analysis.pos)}">${r.analysis.cp.toFixed(2)}</td></tr>`;
  });
  document.getElementById('summary').innerHTML = `
    <h2>📋 ${currentSymbol} 缠论多级别中枢汇总</h2>
    <table><tr><th>级别</th><th>中枢区间 (ZD ~ ZG)</th><th>当前位置</th><th>当前价</th></tr>${rows}</table>
    <p style="margin-top:14px;color:#8b949e;font-size:12px">
      💡 图例说明：<span style="color:#ff6b6b">红线=第1笔</span> | <span style="color:#4ecdc4">青线=第2笔</span> | <span style="color:#ffe66d">黄线=第3笔</span> | <span style="color:#f39c12">黄虚线=中枢区间</span>
    </p>`;

  window.addEventListener('resize', () => {
    ['daily','weekly','monthly'].forEach(period => {
      const r = allResults[period];
      drawKline('kline-'+period, r.raw, r.zs, r.fractals, r.analysis);
      drawMACD('macd-'+period, r.raw, r.analysis);
    });
  });
}
